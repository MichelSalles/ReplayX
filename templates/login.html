<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | ReplayX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">
    <div class="form-card">
        <a class="back-link" href="{{ url_for('landing') }}">Replay<span>X</span></a>
        <h1>Entrar</h1>
        <p class="muted">Acesse seus replays ou administre sua marca.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <p class="notice {{ category }}">{{ message }}</p>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <label>Usuario</label>
            <input type="text" name="username" required>
            <label>Senha</label>
            <input type="password" name="password" required>
            <button type="submit">Entrar</button>
        </form>
        <p class="form-footer">Quer usar o ReplayX? <a href="{{ url_for('contratar') }}">Contratar</a></p>
    </div>
</body>
</html>
