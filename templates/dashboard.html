<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replays | ReplayX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="topo">
        <h1>Replay<span>X</span></h1>
        <div class="top-links">
            {% if current_user.is_master %}
            <a class="panel-link" href="{{ url_for('master_dashboard') }}">Painel master</a>
            {% endif %}
            <a href="{{ url_for('logout') }}" class="logout-btn">Sair</a>
        </div>
    </div>

    <h2 class="dashboard-title">Replays de {{ current_user.tenant.business_name }}</h2>

    <div class="videos-grid">
        {% for item in videos %}
        <div class="video-card">
            <video controls>
                <source src="{{ url_for('replay_media', replay_id=item.id) }}" type="video/mp4">
            </video>
            <div class="video-info">
                <h3>{{ item.filename }}</h3>
                <a href="{{ url_for('replay_media', replay_id=item.id) }}" download>
                    <button class="download-btn">Baixar video</button>
                </a>
            </div>
        </div>
        {% else %}
        <p class="empty-state">Nenhum replay publicado ainda.</p>
        {% endfor %}
    </div>
</body>
</html>
